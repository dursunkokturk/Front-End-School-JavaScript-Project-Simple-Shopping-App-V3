<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alış Veriş Uygulaması</title>
  <script src="assets/js/products.js" defer></script>
</head>

<body>

  <h2>Tüm Sebze ve Meyveler</h2>
  <table class="modern-table">
    <thead>
      <tr>
        <th class="title">Adı</th>
        <th class="title">Türü</th>
        <th class="title">Üretim Yeri</th>
        <th class="title">Alış Fiyatı</th>
        <th class="title">Satış Fiyatı</th>
        <th class="title">Stok Bilgisi</th>
      </tr>
    </thead>
    <tbody id="allVegetablesAndFruits"></tbody>
  </table>

  <h2>Sepetiniz</h2>
  <table class="modern-table">
    <thead>
      <tr>
        <th class="title">Adı</th>
        <th class="title">Türü</th>
        <th class="title">Üretim Yeri</th>
        <th class="title">Alış Fiyatı</th>
        <th class="title">Satış Fiyatı</th>
        <th class="title">Stok Bilgisi</th>
      </tr>
    </thead>
    <tbody id="allUserBasket"></tbody>
  </table>

  <input type="text" id="userInput" placeholder="Ürünü Giriniz">
  <button id="productAdd">Sepete Ekle</button>

  <h3 id="totalPrice"></h3>

</body>

</html>
